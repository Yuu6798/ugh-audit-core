name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Check README line count
        # 上限は CLAUDE.md §README 管理ポリシー参照
        run: |
          LINES=$(wc -l < README.md)
          LIMIT=350
          if [ "$LINES" -gt "$LIMIT" ]; then
            echo "::error::README.md has $LINES lines (limit: $LIMIT). Extract sections over 30 lines to docs/<topic>.md. See CLAUDE.md §README 管理ポリシー."
            exit 1
          fi
          echo "README.md: $LINES / $LIMIT lines"

      - name: Lint
        run: ruff check .

      - name: Test
        run: python -m pytest -q --tb=short
