# premise_frames.yaml — 前提フレーム定義（7種、detection_hint付き）

frames:
  premise_acceptance:
    description: "質問に埋め込まれた前提を無批判に受容する"
    detection_hint:
      question_patterns: ["〜は〜だ", "〜ため", "〜である以上", "〜という前提", "〜として"]
      challenge_indicators: ["前提", "疑問", "本当に", "必ずしも", "とは限らない", "再検討", "問い直", "仮定"]
    severity_base: 1.0

  binary_reduction:
    description: "多面的な問題を二択に矮小化する"
    detection_hint:
      question_patterns: ["〜か？", "〜か否か", "〜べきか"]
      challenge_indicators: ["第三の", "別の視点", "二項対立", "単純化", "多面的", "グラデーション", "スペクトラム", "だけでなく", "それ以外"]
    severity_base: 1.0

  scope_deflection:
    description: "質問のスコープを意図的に逸脱させる"
    detection_hint:
      question_patterns: ["具体的に", "特に", "特定の"]
      challenge_indicators: ["範囲", "限定", "射程", "スコープ", "焦点"]
    severity_base: 0.5

  metric_omnipotence:
    description: "単一指標で全てを説明可能とする誤謬"
    detection_hint:
      question_patterns: ["〜だけで", "〜さえ", "〜が高ければ", "〜が低ければ"]
      challenge_indicators: ["単一", "複合", "限界", "十分条件", "必要条件", "他の指標", "だけでは"]
    severity_base: 0.5

  authority_appeal:
    description: "権威への訴えによる論証"
    detection_hint:
      question_patterns: ["〜によれば", "〜が言っている", "専門家", "研究者"]
      challenge_indicators: ["権威", "根拠", "エビデンス", "批判的", "検証", "鵜呑み"]
    severity_base: 0.5

  safety_boilerplate:
    description: "安全性フレーズによる回答の空洞化"
    detection_hint:
      question_patterns: []
      challenge_indicators: ["具体的", "実質的", "本質", "核心"]
    severity_base: 0.5

  relativism_drift:
    description: "相対主義への逃避（何でも正しい／何でも間違い）"
    detection_hint:
      question_patterns: ["〜は正しいか", "〜は間違いか"]
      challenge_indicators: ["基準", "判断", "根拠", "条件付き", "文脈依存"]
    severity_base: 0.5
